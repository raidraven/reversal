<svg viewBox="0 0 800 1444" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif">
  <defs>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6c878" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#8a6f2f" stop-opacity="0.35" />
    </linearGradient>
  </defs>

  <rect width="800" height="1444" fill="#0a0708" />

  <text x="400" y="52" text-anchor="middle" fill="#e6c878" font-size="28" letter-spacing="1">
    位階ロードマップ
  </text>
  <text x="400" y="80" text-anchor="middle" fill="#8a7a6a" font-size="14" letter-spacing="2">
    Lv.1 扉を開いた者 → Lv.3 見習いの仮面 → Lv.5 夜会の常連
  </text>

  <line x1="400" y1="140" x2="400" y2="1414" stroke="#8a6f2f" stroke-width="2" stroke-dasharray="2 6" opacity="0.5" />

  
  <g transform="translate(60,120)">
    <rect width="680" height="230" rx="14" fill="#160f11" stroke="url(#cardBorder)" stroke-width="2" />
    <circle cx="60" cy="55" r="30" fill="#1f1418" stroke="#c9a24d" stroke-width="2" />
    <text x="60" y="63" text-anchor="middle" fill="#e6c878" font-size="24" font-weight="bold">1</text>
    <text x="105" y="48" fill="#8a7a6a" font-size="13">位階 Lv.1</text>
    <text x="105" y="72" fill="#f5ede0" font-size="22" font-weight="bold">扉を開いた者 ― 土台を作る期間</text>

    <text x="40" y="90" fill="#e6c878" font-size="15" font-weight="bold">やること</text>
    <text x="40" y="115" fill="#d8cfc2" font-size="14">・AIツールを1つだけ選んで、1週間触ってみる</text>
    <text x="40" y="138" fill="#d8cfc2" font-size="14">・発信する場所を1つ決める(X / 掲示板など)</text>
    <text x="40" y="161" fill="#d8cfc2" font-size="14">・今日AIで何をしたかを1行でいいので記録する</text>

    <text x="400" y="90" fill="#7d2438" font-size="15" font-weight="bold">やらなくていい</text>
    <text x="400" y="115" fill="#a08e93" font-size="14">・収益化の方法を細かく調べる</text>
    <text x="400" y="138" fill="#a08e93" font-size="14">・高額講座や情報商材を探す</text>
    <text x="400" y="161" fill="#a08e93" font-size="14">・フォロワー数を気にする</text>
  </g>

  <g transform="translate(60,390)">
    <rect width="680" height="207" rx="14" fill="#160f11" stroke="url(#cardBorder)" stroke-width="2" />
    <circle cx="60" cy="55" r="30" fill="#1f1418" stroke="#c9a24d" stroke-width="2" />
    <text x="60" y="63" text-anchor="middle" fill="#e6c878" font-size="24" font-weight="bold">2</text>
    <text x="105" y="48" fill="#8a7a6a" font-size="13">位階 Lv.2</text>
    <text x="105" y="72" fill="#f5ede0" font-size="22" font-weight="bold">扉を開いた者 ― 記録を習慣にする期間</text>

    <text x="40" y="90" fill="#e6c878" font-size="15" font-weight="bold">やること</text>
    <text x="40" y="115" fill="#d8cfc2" font-size="14">・1行記録を毎日途切れさせずに続ける</text>
    <text x="40" y="138" fill="#d8cfc2" font-size="14">・書き溜めた記録をたまに読み返す</text>

    <text x="400" y="90" fill="#7d2438" font-size="15" font-weight="bold">やらなくていい</text>
    <text x="400" y="115" fill="#a08e93" font-size="14">・反応がないからと記録をやめる</text>
  </g>

  <g transform="translate(60,637)">
    <rect width="680" height="230" rx="14" fill="#160f11" stroke="url(#cardBorder)" stroke-width="2" />
    <circle cx="60" cy="55" r="30" fill="#1f1418" stroke="#c9a24d" stroke-width="2" />
    <text x="60" y="63" text-anchor="middle" fill="#e6c878" font-size="24" font-weight="bold">3</text>
    <text x="105" y="48" fill="#8a7a6a" font-size="13">位階 Lv.3</text>
    <text x="105" y="72" fill="#f5ede0" font-size="22" font-weight="bold">見習いの仮面 ― 発信を型にする期間</text>

    <text x="40" y="90" fill="#e6c878" font-size="15" font-weight="bold">やること</text>
    <text x="40" y="115" fill="#d8cfc2" font-size="14">・発信のローテーションを曜日ごとに決める</text>
    <text x="40" y="138" fill="#d8cfc2" font-size="14">・他の来賓の実践記録を掲示板で見る</text>
    <text x="40" y="161" fill="#d8cfc2" font-size="14">・小さな成果も言語化して積み上げる</text>

    <text x="400" y="90" fill="#7d2438" font-size="15" font-weight="bold">つまずきやすい</text>
    <text x="400" y="115" fill="#a08e93" font-size="14">・反応がない時期に発信をやめてしまう</text>
    <text x="400" y="138" fill="#a08e93" font-size="14">・反応は「続けた人」に後から追いつく</text>
  </g>

  <g transform="translate(60,907)">
    <rect width="680" height="207" rx="14" fill="#160f11" stroke="url(#cardBorder)" stroke-width="2" />
    <circle cx="60" cy="55" r="30" fill="#1f1418" stroke="#c9a24d" stroke-width="2" />
    <text x="60" y="63" text-anchor="middle" fill="#e6c878" font-size="24" font-weight="bold">4</text>
    <text x="105" y="48" fill="#8a7a6a" font-size="13">位階 Lv.4</text>
    <text x="105" y="72" fill="#f5ede0" font-size="22" font-weight="bold">見習いの仮面 ― 型を守り抜く期間</text>

    <text x="40" y="90" fill="#e6c878" font-size="15" font-weight="bold">やること</text>
    <text x="40" y="115" fill="#d8cfc2" font-size="14">・決めたローテーションを反応が薄くても崩さない</text>
    <text x="40" y="138" fill="#d8cfc2" font-size="14">・型を守りながら小さく改善する</text>

    <text x="400" y="90" fill="#7d2438" font-size="15" font-weight="bold">つまずきやすい</text>
    <text x="400" y="115" fill="#a08e93" font-size="14">・反応の良し悪しで型をころころ変える</text>
  </g>

  <g transform="translate(60,1154)">
    <rect width="680" height="230" rx="14" fill="#160f11" stroke="url(#cardBorder)" stroke-width="2" />
    <circle cx="60" cy="55" r="30" fill="#1f1418" stroke="#c9a24d" stroke-width="2" />
    <text x="60" y="63" text-anchor="middle" fill="#e6c878" font-size="24" font-weight="bold">5</text>
    <text x="105" y="48" fill="#8a7a6a" font-size="13">位階 Lv.5</text>
    <text x="105" y="72" fill="#f5ede0" font-size="22" font-weight="bold">夜会の常連 ― 収益化の種をまく期間</text>

    <text x="40" y="90" fill="#e6c878" font-size="15" font-weight="bold">やること</text>
    <text x="40" y="115" fill="#d8cfc2" font-size="14">・自分の実践記録そのものを資産にする</text>
    <text x="40" y="138" fill="#d8cfc2" font-size="14">・高単価な案件を1つ選んで深く扱う</text>
    <text x="40" y="161" fill="#d8cfc2" font-size="14">・誠実さを手放さない(誇張しない)</text>

    <text x="400" y="90" fill="#7d2438" font-size="15" font-weight="bold">注意</text>
    <text x="400" y="115" fill="#a08e93" font-size="14">・土台がないまま焦って収益化しない</text>
  </g>
  <polygon points="400,382 388,360 412,360" fill="#c9a24d" />
  <polygon points="400,629 388,607 412,607" fill="#c9a24d" />
  <polygon points="400,899 388,877 412,877" fill="#c9a24d" />
  <polygon points="400,1146 388,1124 412,1124" fill="#c9a24d" />

  <text x="400" y="1409" text-anchor="middle" fill="#8a7a6a" font-size="13">
    「稼げます」ではなく「続けられます」を目的にした5段階
  </text>
</svg>
